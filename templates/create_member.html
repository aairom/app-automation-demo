{% extends "base.html" %}

{% block title %}Create New Member{% endblock %}

{% block content %}
<h1>Create New Member</h1>

<form method="POST">
    <div class="form-group">
        <label for="last_name">Last Name *</label>
        <input type="text" id="last_name" name="last_name" required>
    </div>
    
    <div class="form-group">
        <label for="first_name">First Name *</label>
        <input type="text" id="first_name" name="first_name" required>
    </div>
    
    <div class="form-group">
        <label for="date_of_birth">Date of Birth *</label>
        <input type="date" id="date_of_birth" name="date_of_birth" required>
    </div>
    
    <div class="form-group">
        <label for="username">Username *</label>
        <input type="text" id="username" name="username" required>
    </div>
    
    <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" id="password" name="password" required>
    </div>
    
    <div class="form-group">
        <label for="secret">Secret (stored in Vault)</label>
        <textarea id="secret" name="secret" rows="3" placeholder="Optional secret data to store in HashiCorp Vault"></textarea>
    </div>
    
    <div class="actions">
        <button type="submit" class="btn">Create Member</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
